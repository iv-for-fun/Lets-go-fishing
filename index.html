<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Let's Go Fishing 🎣</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --green: #2D6A4F;
      --blue: #48CAE4;
      --sand: #F4E285;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; }
    .tab-btn { @apply px-5 py-3 text-xs font-bold uppercase tracking-wider transition-all duration-200 border-b-2 border-transparent; }
    .tab-active { @apply border-green-700 text-green-700 bg-white; }
    .tab-inactive { @apply text-gray-400 bg-gray-50 hover:bg-gray-100 hover:text-gray-600; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <header class="sticky top-0 z-10 bg-white shadow-md px-4 py-3">
    <div class="flex items-center justify-between">
      <h1 class="text-xl font-bold text-green-800 flex items-center gap-2">
        <span>🎣</span> Let's Go Fishing
      </h1>
    </div>
    <div class="flex flex-wrap gap-2 mt-3">
      <div class="flex-1 min-w-[200px]">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide block mb-1" for="locationInput">Your Location</label>
        <input id="locationInput" type="text" placeholder="City, State or 'Current'"
          class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none min-h-[44px]" />
      </div>
      <div class="w-24">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide block mb-1" for="driveTime">Max Drive</label>
        <select id="driveTime" class="w-full border rounded-lg px-2 py-2 text-sm min-h-[44px]">
          <option value="0.5">30 min</option>
          <option value="1.0">1 hr</option>
          <option value="1.5" selected>1.5 hr</option>
          <option value="2.5">2.5 hr</option>
          <option value="4.0">4 hr</option>
        </select>
      </div>
      <div class="w-20">
        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide block mb-1" for="childAge">Kid Age</label>
        <input id="childAge" type="number" min="1" max="15" value="6"
          class="w-full border rounded-lg px-2 py-2 text-sm min-h-[44px]" />
      </div>
      <button id="searchBtn"
        class="bg-green-700 hover:bg-green-800 text-white px-5 py-2 rounded-lg text-sm font-bold min-h-[44px] self-end shadow-sm transition-all active:scale-95">
        Find Spots
      </button>
  <!-- Banners -->
  <div id="gpsBanner" style="display:none;" class="bg-yellow-50 border-b border-yellow-200 px-4 py-2 text-[11px] text-yellow-800 font-medium">
    📍 Using manual location — Geolocation access was denied or unavailable.
  </div>
  <div id="weatherBanner" style="display:none;" class="bg-blue-50 border-b border-blue-200 px-4 py-2 text-[11px] text-blue-800 font-medium">
    🌤️ Using estimated weather — Live data requires an API key in config.js.
  </div>

  <!-- List View -->
  <main id="listView" class="px-4 py-5 max-w-2xl mx-auto">
    <div id="loadingState" style="display:none;" class="text-center py-20">
      <div class="spinner inline-block w-8 h-8 border-4 border-green-700 border-t-transparent rounded-full mb-3"></div>
      <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Searching Waters...</p>
    </div>
    <div id="cardContainer" class="space-y-4"></div>
  </main>

  <!-- Detail View -->
  <div id="detailView" style="display:none;" class="max-w-2xl mx-auto px-4 py-5 pb-24">
    <button onclick="showListView()" class="flex items-center gap-2 text-green-700 font-bold text-sm mb-5 hover:translate-x-[-4px] transition-transform">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
      Back to results
    </button>
    <div id="detailContent"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 z-10 shadow-lg">
    <button onclick="showListView()" class="flex flex-col items-center text-[10px] font-bold uppercase text-green-700">
      <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
      Explore
    </button>
    <button onclick="alert('Maps view coming soon!')" class="flex flex-col items-center text-[10px] font-bold uppercase text-gray-400">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7l6-3 5.447 2.724a1 1 0 01.553.894v10.764a1 1 0 01-1.447.894L15 17l-6 3z"></path></svg>
      Map
    </button>
    <button onclick="alert('Saved spots coming soon!')" class="flex flex-col items-center text-[10px] font-bold uppercase text-gray-400">
      <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
      Saved
    </button>
  </nav>

  <script src="config.js"></script>
  <script src="scorer.js"></script>
  <script src="app.js"></script>
  <script>
    let allResults = [];
    
    function scoreBadge(score) {
      const color = score >= 70 ? 'bg-green-500' : score >= 40 ? 'bg-yellow-500' : 'bg-red-500';
      const label = score >= 70 ? 'Excellent' : score >= 40 ? 'Good' : 'Poor';
      return `<span class="${color} text-white text-[10px] font-black uppercase px-2 py-1 rounded-md shadow-sm">${label} ${score}</span>`;
    }

    function tagPill(label, color = "bg-gray-100 text-gray-600") {
      return `<span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${color}">${label}</span>`;
    }

    function showListView() {
      document.getElementById("detailView").style.display = "none";
      document.getElementById("listView").style.display = "block";
      window.scrollTo(0, 0);
    }

    function switchTab(tabName, locId) {
      const tabs = ['overview', 'fish', 'amenities', 'forecast'];
      tabs.forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if (el) el.style.display = t === tabName ? 'block' : 'none';
        const btn = document.getElementById(`btn-${t}`);
        if (btn) btn.className = t === tabName ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
      });
      if (tabName === 'forecast') {
        const loc = allResults.find(l => l.id === locId);
        renderForecast(loc);
      }
    }


    function getMoonPhase(date) {
      const refNew = new Date('2000-01-06T18:14:00Z');
      const diffMs = date - refNew;
      const diffDays = diffMs / (1000 * 60 * 60 * 24);
      return (diffDays % 29.53) / 29.53;
    }

    </div>
  </header>
